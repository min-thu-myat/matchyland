<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" href="Matchyland_Logo.png">
    <title>Matchyland · Play Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Navigation -->
        <nav class="nav">
            <div class="nav-container">
                <a href="index.html" class="logo">
                    <img src="Matchyland_Logo.png" alt="Matchyland Logo" class="logo-img">
                    <span class="logo-text">matchy<span class="highlight">land</span></span>
                </a>
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">☰</button>
                <div class="nav-links" id="navLinks">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="game.html" class="nav-link active">Game</a>
                    <a href="howto.html" class="nav-link">How to Play</a>
                    <a href="scores.html" class="nav-link">Scores</a>
                    <a href="stats.html" class="nav-link">Statistics</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="settings.html" class="nav-link">Settings</a>
                </div>
            </div>
        </nav>

        <!-- Game Content -->
        <main class="main">
            <div class="game-header">
                <div class="difficulty-selector" id="difficultySelector">
                    <button class="difficulty-btn active" onclick="changeDifficulty('easy')">Easy</button>
                    <button class="difficulty-btn" onclick="changeDifficulty('medium')">Medium</button>
                    <button class="difficulty-btn" onclick="changeDifficulty('hard')">Hard</button>
                </div>
                <div class="game-actions">
                    <button class="icon-btn" onclick="toggleSound()" id="soundBtn">🔊</button>
                    <!-- New: Hint Button -->
                    <button class="icon-btn" onclick="useHint()" id="hintBtn" title="Use hint (3 per game)">💡</button>
                    <!-- New: Pause Button -->
                    <button class="icon-btn" onclick="togglePause()" id="pauseBtn" title="Pause game">⏸️</button>
                </div>
            </div>

            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-label">Time</span>
                    <span class="stat-value" id="timer">00:00</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Moves</span>
                    <span class="stat-value" id="moves">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Hints Left</span>
                    <span class="stat-value" id="hintsLeft">3</span>
                </div>
                <button class="btn btn-secondary btn-small" onclick="restartGame()">Restart</button>
            </div>

            <div class="board" id="gameBoard">
                <!-- Cards will be generated by JavaScript -->
            </div>

            <!-- New: Pause Overlay -->
            <div id="pauseOverlay" class="pause-overlay" style="display: none;">
                <div class="pause-content">
                    <h2>⏸️ Game Paused</h2>
                    <p>Click anywhere to resume</p>
                    <button class="btn btn-primary" onclick="togglePause()">Resume Game</button>
                </div>
            </div>

            <div class="personal-best-card" id="personalBest">
                <span class="pb-label">🏆 Personal Best (Easy)</span>
                <span class="pb-value" id="bestScore">Not played yet</span>
            </div>
        </main>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Great job! 🎉</h2>
            <div class="modal-stats">
                <div class="modal-stat">
                    <span class="modal-stat-label">Moves</span>
                    <span class="modal-stat-value" id="finalMoves">0</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-label">Time</span>
                    <span class="modal-stat-value" id="finalTime">00:00</span>
                </div>
            </div>
            <div class="new-record-badge" id="newRecordBadge" style="display: none;">
                ⭐ New Personal Record!
            </div>
            <div class="modal-actions">
                <button onclick="playAgain()" class="btn btn-primary">Play Again</button>
                <button onclick="closeModal()" class="btn btn-secondary">Close</button>
            </div>
            <button onclick="closeModal()" class="modal-close">✕</button>
        </div>
    </div>

    <script src="game.js"></script>
    <script src="settings.js"></script>
    <script src="shared.js"></script>
</body>
</html>
